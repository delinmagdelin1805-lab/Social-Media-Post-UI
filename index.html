<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Social Media Post</title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Main Card -->

    <div class="post-card">

        <!-- Top Section -->

        <div class="top">

            <div class="profile">

                <img
                    src="https://i.pravatar.cc/150?img=12"
                    alt="Profile">

                <div>

                    <h3>
                        Creative Studio
                    </h3>

                    <span>
                        Sponsored
                    </span>

                </div>

            </div>

            <i class="fa-solid fa-ellipsis"></i>

        </div>

        <!-- Content -->

        <div class="content">

            <span class="tag">
                NEW DESIGN
            </span>

            <h1>
                Social Media UI
            </h1>

            <p>
                Modern responsive social media
                post design using HTML, CSS
                & JavaScript.
            </p>

            <button>
                Learn More
            </button>

        </div>

        <!-- Illustration -->

        <div class="illustration">

            <img
                src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
                alt="Illustration">

        </div>

        <!-- Bottom Section -->

        <div class="bottom">

            <div class="action">

                <i class="fa-solid fa-heart"></i>

                <span>
                    12.5K
                </span>

            </div>

            <div class="action">

                <i class="fa-solid fa-comment"></i>

                <span>
                    2.1K
                </span>

            </div>

            <div class="action">

                <i class="fa-solid fa-share"></i>

                <span>
                    Share
                </span>

            </div>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
